name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Install dependencies
        run: npm ci

      - name: Build site
        run: npm run build
        env:
          GITHUB_TOKEN: ${{ github.token }}
          # Public write-only token; it ships in the built JS either way. Held as
          # a secret only so it stays out of this public repo's git history and
          # its public Actions logs, and so it can be rotated without a commit.
          # Unset => the analytics chunk is not emitted at all.
          PUBLIC_ANALYTICS_KEY: ${{ secrets.PUBLIC_ANALYTICS_KEY }}
          PUBLIC_ANALYTICS_HOST: https://eu.i.posthog.com

      - name: Check internal links
        run: npm run link-check

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
